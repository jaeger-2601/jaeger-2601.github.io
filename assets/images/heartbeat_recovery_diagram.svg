<svg xmlns="http://www.w3.org/2000/svg" width="500" height="540" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="500" height="540" fill="#111111"/>

  <!-- ═══ COLUMN HEADERS ═══ -->
  <rect x="30" y="30" width="140" height="40" fill="#1a1a1a" stroke="#ffffff" stroke-width="1.5"/>
  <text x="100" y="55" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">Worker A</text>

  <!-- Redis header (cylinder) -->
  <rect x="180" y="38" width="140" height="28" fill="#1a1a1a" stroke="#ffffff" stroke-width="1.5"/>
  <ellipse cx="250" cy="38" rx="70" ry="9" fill="#2a2a2a" stroke="#ffffff" stroke-width="1.5"/>
  <ellipse cx="250" cy="66" rx="70" ry="9" fill="#1a1a1a" stroke="#ffffff" stroke-width="1.5"/>
  <text x="250" y="57" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">Redis</text>

  <rect x="330" y="30" width="140" height="40" fill="#1a1a1a" stroke="#ffffff" stroke-width="1.5"/>
  <text x="400" y="55" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">Worker B</text>

  <!-- ═══ VERTICAL LIFELINES ═══ -->
  <line x1="100" y1="70" x2="100" y2="460" stroke="#444444" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="250" y1="75" x2="250" y2="460" stroke="#444444" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="400" y1="70" x2="400" y2="460" stroke="#444444" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ═══ STEP 1: Worker A picks up job ═══ -->
  <text x="100" y="106" text-anchor="middle" font-size="9" fill="#aaaaaa">picks up job123</text>
  <circle cx="100" cy="118" r="5" fill="#ffffff"/>

  <!-- ═══ STEP 2: Worker A writes to Redis ═══ -->
  <!-- Arrow: Worker A → Redis -->
  <line x1="105" y1="150" x2="230" y2="150" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="230,150 218,144 218,156" fill="#ffffff"/>
  <text x="165" y="144" text-anchor="middle" font-size="8" fill="#aaaaaa">SET PROCESSING</text>
  <text x="165" y="162" text-anchor="middle" font-size="8" fill="#666666">heartbeat: t1</text>
  <circle cx="100" cy="150" r="4" fill="#ffffff"/>

  <!-- Redis state box -->
  <rect x="193" y="162" width="114" height="28" rx="2" fill="#1a1a1a" stroke="#888888" stroke-width="1"/>
  <text x="250" y="175" text-anchor="middle" font-size="8" fill="#aaaaaa">PROCESSING · hb: t1</text>
  <text x="250" y="185" text-anchor="middle" font-size="8" fill="#666666">worker: A</text>

  <!-- ═══ STEP 3: Worker A is processing ═══ -->
  <circle cx="100" cy="220" r="4" fill="#ffffff"/>
  <text x="100" y="214" text-anchor="middle" font-size="9" fill="#aaaaaa">processing…</text>

  <!-- ═══ STEP 4: Worker A crashes ═══ -->
  <rect x="40" y="238" width="120" height="38" fill="#1a1a1a" stroke="#ffffff" stroke-width="1.5"/>
  <text x="100" y="255" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">💥 crash</text>
  <text x="100" y="269" text-anchor="middle" font-size="8" fill="#aaaaaa">heartbeat stops</text>

  <!-- Worker A lifeline ends -->
  <line x1="100" y1="276" x2="100" y2="300" stroke="#555555" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="84" y1="300" x2="116" y2="300" stroke="#555555" stroke-width="1.5"/>

  <!-- ═══ TIME GAP ═══ -->
  <text x="250" y="328" text-anchor="middle" font-size="9" fill="#444444">· · · · · · · · · · · · · · ·</text>
  <text x="250" y="342" text-anchor="middle" font-size="8" fill="#444444">Kafka redelivers job123</text>

  <!-- ═══ STEP 5: Worker B picks up redelivered message ═══ -->
  <circle cx="400" cy="362" r="5" fill="#ffffff"/>
  <text x="400" y="356" text-anchor="middle" font-size="9" fill="#aaaaaa">receives job123</text>

  <!-- ═══ STEP 6: Worker B checks Redis ═══ -->
  <!-- Arrow: Worker B → Redis -->
  <line x1="395" y1="388" x2="270" y2="388" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="270,388 282,382 282,394" fill="#ffffff"/>
  <text x="335" y="382" text-anchor="middle" font-size="8" fill="#aaaaaa">GET job123</text>
  <circle cx="400" cy="388" r="4" fill="#ffffff"/>

  <!-- Redis response: stale heartbeat -->
  <!-- Arrow: Redis → Worker B -->
  <line x1="270" y1="408" x2="395" y2="408" stroke="#aaaaaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="395,408 383,402 383,414" fill="#aaaaaa"/>
  <text x="335" y="402" text-anchor="middle" font-size="8" fill="#aaaaaa">PROCESSING · hb stale</text>

  <!-- ═══ STEP 7: Worker B takes ownership → RETRY ═══ -->
  <rect x="330" y="424" width="140" height="40" fill="#1a1a1a" stroke="#ffffff" stroke-width="1.5"/>
  <text x="400" y="441" text-anchor="middle" font-size="9" fill="#aaaaaa">takes ownership</text>
  <text x="400" y="456" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">RETRY</text>

  <!-- ═══ CAPTION ═══ -->
  <text x="250" y="500" text-anchor="middle" font-size="10" fill="#555555" font-style="italic">Figure 3: Worker B detects stale heartbeat in Redis and takes ownership</text>

</svg>
